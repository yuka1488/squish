<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせ / Contact — SQUISH</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f6f2; --surface: #ffffff; --border: #e4e1d8;
    --accent: #2a5c24; --accent-light: #e6f2e4;
    --text: #1c1c1a; --muted: #8c8980;
    --shadow: 0 1px 12px rgba(0,0,0,0.06);
    --shadow-lg: 0 6px 32px rgba(0,0,0,0.10);
  }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 18px 0; box-shadow: var(--shadow); }
  .header-inner { max-width: 720px; margin: 0 auto; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 900; color: var(--text); text-decoration: none; letter-spacing: -0.02em; }
  .logo em { color: var(--accent); font-style: normal; }
  .back-btn { font-size: 0.78rem; color: var(--accent); text-decoration: none; font-weight: 600; background: var(--accent-light); padding: 5px 12px; border-radius: 6px; transition: all 0.15s; }
  .back-btn:hover { background: var(--accent); color: white; }

  .container { max-width: 560px; margin: 0 auto; padding: 52px 24px 80px; }

  .lang-toggle { display: flex; gap: 8px; margin-bottom: 36px; }
  .lang-btn { padding: 5px 14px; font-size: 0.72rem; font-weight: 600; cursor: pointer; border: 1.5px solid var(--border); background: var(--surface); color: var(--muted); font-family: 'DM Sans', sans-serif; border-radius: 6px; transition: all 0.15s; }
  .lang-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

  h1 { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 900; margin-bottom: 8px; letter-spacing: -0.02em; }
  .subtitle { font-size: 0.9rem; color: var(--muted); margin-bottom: 36px; line-height: 1.7; }

  .form-group { margin-bottom: 20px; }
  label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }

  input[type="text"], input[type="email"], select, textarea {
    width: 100%;
    padding: 12px 16px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  input:focus, select:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
  textarea { resize: vertical; min-height: 140px; line-height: 1.6; }

  .submit-btn {
    width: 100%;
    padding: 15px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 16px rgba(42,92,36,0.2);
    margin-top: 8px;
  }

  .submit-btn:hover { background: #1e4419; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(42,92,36,0.3); }

  .success-msg {
    display: none;
    background: var(--accent-light);
    border: 1px solid var(--accent);
    border-radius: 10px;
    padding: 20px;
    text-align: center;
    margin-top: 20px;
  }

  .success-msg .icon { font-size: 2rem; margin-bottom: 8px; }
  .success-msg p { font-size: 0.9rem; color: var(--accent); font-weight: 600; }

  .note { font-size: 0.75rem; color: var(--muted); margin-top: 16px; line-height: 1.6; }
  .note a { color: var(--accent); }

  footer { background: var(--surface); border-top: 1px solid var(--border); padding: 20px 24px; text-align: center; font-size: 0.73rem; color: var(--muted); }

  .hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="/" class="logo">SQU<em>I</em>SH</a>
    <a href="/" class="back-btn" id="back-btn">← トップに戻る</a>
  </div>
</header>

<div class="container">
  <div class="lang-toggle">
    <button class="lang-btn active" onclick="setLang('ja')">日本語</button>
    <button class="lang-btn" onclick="setLang('en')">English</button>
  </div>

  <h1 id="page-title">お問い合わせ</h1>
  <p class="subtitle" id="page-subtitle">ご質問・ご要望・不具合のご報告など、お気軽にご連絡ください。</p>

  <form id="contact-form">
    <div class="form-group">
      <label id="label-name">お名前</label>
      <input type="text" id="name" placeholder="山田 太郎" required>
    </div>
    <div class="form-group">
      <label id="label-email">メールアドレス</label>
      <input type="email" id="email" placeholder="example@email.com" required>
    </div>
    <div class="form-group">
      <label id="label-type">お問い合わせ種別</label>
      <select id="inquiry-type">
        <option id="opt1">機能に関するご質問</option>
        <option id="opt2">不具合・バグの報告</option>
        <option id="opt3">機能追加のご要望</option>
        <option id="opt4">その他</option>
      </select>
    </div>
    <div class="form-group">
      <label id="label-msg">メッセージ</label>
      <textarea id="message" placeholder="お問い合わせ内容をご記入ください。" required></textarea>
    </div>
    <button type="submit" class="submit-btn" id="submit-btn">送信する</button>
  </form>

  <div class="success-msg" id="success-msg">
    <div class="icon">✅</div>
    <p id="success-text">送信ありがとうございます！内容を確認次第、ご連絡いたします。</p>
  </div>

  <p class="note" id="note-text">
    ご入力いただいた情報は、お問い合わせへの返答以外の目的には使用しません。
    詳しくは<a href="/privacy.html">プライバシーポリシー</a>をご覧ください。
  </p>
</div>

<footer>SQUISH — © 2025</footer>

<script>
  const texts = {
    ja: {
      title: 'お問い合わせ',
      subtitle: 'ご質問・ご要望・不具合のご報告など、お気軽にご連絡ください。',
      back: '← トップに戻る',
      name: 'お名前', email: 'メールアドレス', type: 'お問い合わせ種別', msg: 'メッセージ',
      opt1: '機能に関するご質問', opt2: '不具合・バグの報告', opt3: '機能追加のご要望', opt4: 'その他',
      submit: '送信する',
      success: '送信ありがとうございます！内容を確認次第、ご連絡いたします。',
      note: 'ご入力いただいた情報は、お問い合わせへの返答以外の目的には使用しません。詳しくは',
      nameP: '山田 太郎', msgP: 'お問い合わせ内容をご記入ください。'
    },
    en: {
      title: 'Contact Us',
      subtitle: 'Have a question, feature request, or found a bug? We\'d love to hear from you.',
      back: '← Back to Top',
      name: 'Your Name', email: 'Email Address', type: 'Inquiry Type', msg: 'Message',
      opt1: 'General Question', opt2: 'Bug Report', opt3: 'Feature Request', opt4: 'Other',
      submit: 'Send Message',
      success: 'Thank you! We\'ll get back to you as soon as possible.',
      note: 'Your information will only be used to respond to your inquiry. See our',
      nameP: 'John Doe', msgP: 'Please describe your inquiry...'
    }
  };

  function setLang(lang) {
    const t = texts[lang];
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent.includes(lang === 'ja' ? '日本語' : 'English')));
    document.getElementById('page-title').textContent = t.title;
    document.getElementById('page-subtitle').textContent = t.subtitle;
    document.getElementById('back-btn').textContent = t.back;
    document.getElementById('label-name').textContent = t.name;
    document.getElementById('label-email').textContent = t.email;
    document.getElementById('label-type').textContent = t.type;
    document.getElementById('label-msg').textContent = t.msg;
    document.getElementById('opt1').textContent = t.opt1;
    document.getElementById('opt2').textContent = t.opt2;
    document.getElementById('opt3').textContent = t.opt3;
    document.getElementById('opt4').textContent = t.opt4;
    document.getElementById('submit-btn').textContent = t.submit;
    document.getElementById('success-text').textContent = t.success;
    document.getElementById('name').placeholder = t.nameP;
    document.getElementById('message').placeholder = t.msgP;
  }

  // Auto detect
  const lang = (navigator.language || 'ja').toLowerCase().startsWith('ja') ? 'ja' : 'en';
  setLang(lang);

  // Form submit (フォームはformspree等に繋ぐ前のデモ動作)
  document.getElementById('contact-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    btn.textContent = currentLang === 'ja' ? '送信中...' : 'Sending...';
    btn.disabled = true;

    const data = {
      name: document.getElementById('name').value,
      email: document.getElementById('email').value,
      type: document.getElementById('inquiry-type').value,
      message: document.getElementById('message').value,
    };

    try {
      const res = await fetch('https://formspree.io/f/xojpldab', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify(data)
      });
      if (res.ok) {
        document.getElementById('contact-form').style.display = 'none';
        document.getElementById('success-msg').style.display = 'block';
      } else {
        throw new Error('Failed');
      }
    } catch {
      btn.textContent = currentLang === 'ja' ? '送信に失敗しました。再度お試しください。' : 'Failed. Please try again.';
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
